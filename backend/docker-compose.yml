version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: omni_agents_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omni_agents
    ports:
      - '5435:5432'
    volumes:
      - omini_agents_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  omini_agents_pgdata:
